sonar.projectKey=nangman-crypto-hypothesis-harness
sonar.projectName=nangman-crypto-hypothesis-harness
sonar.projectVersion=0.1.0
sonar.sourceEncoding=UTF-8

sonar.sources=src,ecs,.github/workflows
sonar.tests=src
sonar.test.inclusions=src/tests.rs
sonar.exclusions=target/**,sonar-reports/**,src/tests.rs
sonar.coverage.exclusions=ecs/**,.github/**,src/main.rs,src/io.rs,src/tests.rs

sonar.rust.cargo.manifestPaths=Cargo.toml
sonar.rust.clippy.enable=false
sonar.rust.clippy.reportPaths=sonar-reports/clippy.json
sonar.rust.lcov.reportPaths=sonar-reports/lcov.info
